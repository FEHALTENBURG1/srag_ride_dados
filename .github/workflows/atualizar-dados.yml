name: Atualizar dados SRAG RIDE

on:
  schedule:
    # cron em UTC. 09:00 UTC = 06:00 Brasília (UTC-3). Seg (1) e Ter (2).
    - cron: "0 9 * * 1,2"
  workflow_dispatch: {}   # permite rodar manualmente pelo botão "Run workflow"

permissions:
  contents: write          # necessário para commitar o CSV gerado

jobs:
  preparar-dados:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Instalar R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true   # instala pacotes como binários (rápido)

      - name: Instalar pacotes R
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            any::dplyr
            any::tidyr
            any::stringr
            any::lubridate
            any::readr
            any::jsonlite

      - name: Rodar pipeline (download + filtro + preparo)
        run: |
          # Ajuste estes caminhos aos scripts que já existem no seu repo.
          # 01 baixa o INFLUD do S3; 02 filtra pela RIDE -> data/dados_limpos_df.csv
          Rscript R/01_download.R
          Rscript R/02_filter_clean.R
          # 03 aplica todas as derivações -> data/srag_ride_pronto.csv
          Rscript R/03_prepara.R

      - name: Commitar dados atualizados
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/dados_limpos_df.csv data/srag_ride_pronto.csv
          if git diff --staged --quiet; then
            echo "Sem mudanças nos dados. Nada a commitar."
          else
            git commit -m "Atualização automática dos dados SRAG RIDE ($(date -u +'%Y-%m-%d %H:%M UTC'))"
            git push
          fi
