name: Atualizar SRAG RIDE-DF

on:
  schedule:
    - cron: "0 9 * * 1"      # toda segunda, 09:00 UTC
  workflow_dispatch:          # permite rodar manualmente

permissions:
  contents: write             # deixa o bot commitar o CSV de volta

jobs:
  build:
    runs-on: ubuntu-latest
    # A URL agora é descoberta automaticamente via API do OpenDATASUS.
    # Se um dia quiser fixar um arquivo específico, defina SRAG_URLS aqui:
    # env:
    #   SRAG_URLS: "https://.../INFLUD26-DD-MM-AAAA.parquet"
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: "release"
          use-public-rspm: true      # binários prontos -> não compila DuckDB

      - name: Cache de pacotes R
        uses: actions/cache@v4
        with:
          path: ${{ env.R_LIBS_USER }}
          key: r-${{ runner.os }}-duckdb-DBI-jsonlite-v2
          restore-keys: r-${{ runner.os }}-

      - name: Instalar dependências
        run: Rscript -e 'p <- c("duckdb","DBI","jsonlite"); i <- p[!p %in% rownames(installed.packages())]; if (length(i)) install.packages(i)'

      - name: Rodar pipeline
        run: Rscript run_pipeline.R

      - name: Commitar saída se mudou
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/dados_limpos_df.csv
          if git diff --staged --quiet; then
            echo "Sem mudanças."
          else
            git commit -m "Atualiza SRAG RIDE-DF ($(date +%F))"
            git push
          fi
