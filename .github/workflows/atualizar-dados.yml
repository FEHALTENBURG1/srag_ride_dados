
name: Atualizar SRAG RIDE-DF

on:
  schedule:
    - cron: "0 9 * * 1"      # toda segunda, 09:00 UTC
  workflow_dispatch:          # permite rodar manualmente

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Atualize a data do arquivo aqui a cada revisão do OpenDATASUS,
      # ou automatize a descoberta da URL via API do CKAN.
      SRAG_URLS: "https://s3.sa-east-1.amazonaws.com/ckan.saude.gov.br/SRAG/2026/INFLUD26-20-07-2026.parquet"
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: "release"

      - name: Instalar dependências
        run: Rscript -e 'install.packages(c("duckdb","DBI"), repos="https://cloud.r-project.org")'

      - name: Rodar pipeline
        run: Rscript run_pipeline.R

      - name: Commitar saída se mudou
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/dados_limpos_df.csv
          if git diff --staged --quiet; then
            echo "Sem mudanças."
          else
            git commit -m "Atualiza SRAG RIDE-DF ($(date +%F))"
            git push
          fi
